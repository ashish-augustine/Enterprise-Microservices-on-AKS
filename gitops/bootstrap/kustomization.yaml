apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://raw.githubusercontent.com/Azure-Samples/aks-store-demo/main/aks-store-all-in-one.yaml
  - service-account.yaml

# Define the HPA directly in Kustomize
patchesStrategicMerge:
  - |-
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: store-front-hpa
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: store-front
      minReplicas: 1
      maxReplicas: 5
      metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 50

patches:
  # 1. Inject Workload Identity into all Deployments
  - target:
      kind: Deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        template:
          spec:
            serviceAccountName: workload-sa
            
  # 2. Force-Delete Heavy Probes and Inject Lightweight pgrep Readiness
  - target:
      kind: StatefulSet
      name: mongodb
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: mongodb
      spec:
        template:
          spec:
            containers:
              - name: mongodb
                $patch: replace
                livenessProbe: null
                readinessProbe:
                  exec:
                    command:
                    - /bin/sh
                    - -c
                    - pgrep mongod
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                resources:
                  requests:
                    memory: "512Mi"
                    cpu: "250m"
                  limits:
                    memory: "1Gi"
                    cpu: "500m"

  # 3. Expose Makeline Service to the Internet
  - target:
      kind: Service
      name: makeline-service
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: makeline-service
      spec:
        type: LoadBalancer

  # 4. Define CPU Requests for Store-Front (Required for HPA)
  - target:
      kind: Deployment
      name: store-front
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: store-front
      spec:
        template:
          spec:
            containers:
              - name: store-front
                resources:
                  requests:
                    cpu: "10m"
                    memory: "32Mi"
                  limits:
                    cpu: "50m"
                    memory: "64Mi"