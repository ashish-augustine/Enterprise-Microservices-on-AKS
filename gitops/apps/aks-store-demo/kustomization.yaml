apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://raw.githubusercontent.com/Azure-Samples/aks-store-demo/main/aks-store-all-in-one.yaml
  - service-account.yaml
  - hpa.yaml

patchesStrategicMerge:
  - mongodb.yaml

patches:
  # 1. Inject Workload Identity into all Deployments
  - target:
      kind: Deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        template:
          spec:
            serviceAccountName: workload-sa

  # 2. Expose Makeline Service to the Internet
  - target:
      kind: Service
      name: makeline-service
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: makeline-service
      spec:
        type: LoadBalancer

  # 3. Define CPU Requests for Store-Front (Required for HPA)
  - target:
      kind: Deployment
      name: store-front
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: store-front
      spec:
        template:
          spec:
            containers:
              - name: store-front
                resources:
                  requests:
                    cpu: "10m"
                    memory: "32Mi"
                  limits:
                    cpu: "50m"
                    memory: "64Mi"