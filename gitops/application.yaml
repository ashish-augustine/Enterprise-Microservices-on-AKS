apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aks-store-demo-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ashish-augustine/Enterprise-Microservices-on-AKS.git'
    path: gitops/apps/aks-store-demo
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true # Enterprise standard: instantly reverts any manual changes made via kubectl
    syncOptions:
      - CreateNamespace=true 
